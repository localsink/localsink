name: Install dependencies
description: Restore the cached pnpm store and playwright

runs:
  using: composite
  steps:
    - run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      id: pnpm-store
      shell: bash
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: dependencies-cache
      with:
        path: |
          ${{ steps.pnpm-store.outputs.path }}
          ~/.cache/ms-playwright
        key: node-cache-${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
    - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
      with:
        mode: firewall-free
    - run: sfw pnpm install --frozen-lockfile
      shell: bash
    - run: pnpm exec playwright install chromium-headless-shell
      if: steps.dependencies-cache.outputs.cache-hit != 'true'
      shell: bash
